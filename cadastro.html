<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    </style>

    <link rel="stylesheet" href="style5.css">
    <script src="script4.js" defer></script>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>Portal do Candidato</h1>
</header>

<main>
    <div class="cadastro-box">

        <h2>Criar Conta</h2>

        <input type="text" id="nome" placeholder="Nome completo">

        <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX">

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="senha" placeholder="Senha">

        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">

        <button onclick="cadastrar()">Cadastrar</button>

        <p id="mensagem"></p>

        <p>
            Já possui conta?
            <a href="login.html">Entrar</a>
        </p>

    </div>
</main>

<footer>
    <p>© 2026 ENEM - Todos os direitos reservados</p>
</footer>
</body>
</html>
