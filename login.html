<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    </style>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer>  </script>

</head>

<body>
    <header>

        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>
        <h1>Portal do Candidato</h1>

    </header>
    
    <main>
        <div class="loginbox">

            <h2>Login</h2>
            <p>Insira suas credenciais para acessar sua conta.</p>
            <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Formato: XXX.XXX.XXX-XX (inclua pontos e traço)" inputmode="numeric">
            <input type="date" id="data" placeholder="Sua data de nascimento">
            <input type="password" id="senha" placeholder="Digite sua senha">
            <button onclick="fazerLogin()">Entrar</button>
            <p id="mensagem"></p>

            <p>
            Não possui conta?
            <a href="cadastro.html">Cadastre-se</a>
            </p>

        </div>
    </main>

    <footer>
        <p>© 2026 ENEM - Todos os direitos reservados</p>
    </footer>
</body>
</html>
